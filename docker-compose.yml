services:

  postgres:
    image: postgres:17
    container_name: b2b-postgres

    networks:
      - b2b-network

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    networks:
      - b2b-network

    container_name: b2b-backend

    restart: unless-stopped

    ports:
      - "3000:3000"

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}

  frontend:
    build:
      context: ./mobile

    networks:
      - b2b-network

    container_name: b2b-frontend

    restart: unless-stopped

    ports:
      - "8080:80"

    depends_on:
      - backend


volumes:
  postgres_data:


networks:
  b2b-network:
    driver: bridge