version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: b2b-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: b2b168
      POSTGRES_DB: marketplace

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: b2b-backend

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: postgresql://admin:b2b168@postgres:5432/marketplace

    depends_on:
      - postgres

  frontend:
    build:
      context: ./mobile

    container_name: b2b-frontend

    restart: unless-stopped

    ports:
      - "8080:80"

    depends_on:
      - backend

volumes:
  postgres_data: